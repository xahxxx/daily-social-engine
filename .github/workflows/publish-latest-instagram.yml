name: Publish Latest Instagram Post

on:
  workflow_dispatch:
    inputs:
      post_stamp:
        description: "Optional stamped post id, example: 20260709-081500. Leave blank to publish latest.png/latest.json."
        required: false
        type: string

jobs:
  publish-latest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PYTHONUNBUFFERED: "1"
      GITHUB_PAGES_BASE: ${{ vars.GITHUB_PAGES_BASE || 'https://xahxxx.github.io/daily-social-engine/published' }}
      POST_STAMP: ${{ inputs.post_stamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Publish selected image to Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python publish_test_instagram.py
