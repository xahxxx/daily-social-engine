name: Publish Instagram Test

on:
  workflow_dispatch:
    inputs:
      post_stamp:
        description: "Optional stamped post id. Leave blank to publish latest."
        required: false
        type: string

jobs:
  publish-test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      PYTHONUNBUFFERED: "1"
      GITHUB_PAGES_BASE: ${{ vars.GITHUB_PAGES_BASE || 'https://xahxxx.github.io/daily-social-engine/published' }}
      POST_STAMP: ${{ inputs.post_stamp }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Publish test post
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python publish_test_instagram.py
