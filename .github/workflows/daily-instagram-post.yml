name: Daily Instagram Post

on:
  workflow_dispatch:
    inputs:
      publish_to_instagram:
        description: "Publish to Instagram after generating?"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

jobs:
  daily-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify required files exist
        run: |
          test -f brand_profile.json
          test -f hunk_mao_reference.png
          test -f run_daily_pipeline.py

      - name: Generate post brief and image
        env:
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python run_daily_pipeline.py

      - name: Publish files locally for GitHub Pages
        run: |
          mkdir -p published
          STAMP=$(date -u +"%Y%m%d-%H%M%S")
          echo "POST_STAMP=$STAMP" >> "$GITHUB_ENV"
          cp generated_post.png "published/hunk-mao-$STAMP.png"
          cp post_brief.json "published/hunk-mao-$STAMP.json"
          cp generated_post.png published/latest.png
          cp post_brief.json published/latest.json

      - name: Commit published files and debug state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily Hunk Mao post"
          file_pattern: published/*.png published/*.json trend_candidates.json concept_selection_debug.json

      - name: Wait for GitHub Pages to refresh
        run: sleep 90

      - name: Publish to Instagram
        if: ${{ github.event.inputs.publish_to_instagram == 'true' }}
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          POST_STAMP: ${{ env.POST_STAMP }}
          DRY_RUN: "false"
        run: python publish_test_instagram.py

      - name: Dry-run Instagram caption validation
        if: ${{ github.event.inputs.publish_to_instagram != 'true' }}
        env:
          POST_STAMP: ${{ env.POST_STAMP }}
          DRY_RUN: "true"
        run: python publish_test_instagram.py

      - name: Upload daily artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-post
          path: |
            generated_post.png
            post_brief.json
            trend_candidates.json
            concept_selection_debug.json
            post_brief_failed.json
            published/latest.png
            published/latest.json
